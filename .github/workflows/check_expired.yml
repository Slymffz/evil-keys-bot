name: Verificar e Desativar Keys Expiradas

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-expired:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
      
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Desativar keys expiradas
        run: python3 check_expired.py
        
      - name: Commit e Push
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
          # Adiciona as mudanças
          git add keys.json
          
          # Verifica se há mudanças para commitar
          if git diff --staged --quiet; then
            echo "ℹ️ Nenhuma mudança para commitar"
            exit 0
          fi
          
          # Commit
          git commit -m "🤖 Auto: Desativando keys expiradas"
          
          # Puxa mudanças remotas com rebase
          git pull origin main --rebase --strategy-option=theirs || true
          
          # Push
          git push
