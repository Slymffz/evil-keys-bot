name: Verificar e Desativar Keys Expiradas

on:
  schedule:
    # Roda todo dia às 00:00 (horário UTC)
    - cron: '0 0 * * *'
  # Permite rodar manualmente
  workflow_dispatch:

jobs:
  check-expired:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v3
      
      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Desativar keys expiradas
        run: python3 check_expired.py
      
      - name: Commit e Push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add keys.json
          git commit -m "🤖 Auto: Desativando keys expiradas" || echo "Sem mudanças"
          git push
