name: Verificar e Desativar Keys Expiradas

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  check-expired:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip

      - name: Desativar keys expiradas
        run: python3 check_expired.py

      - name: Commit e Push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add keys.json
          git diff --staged --quiet || git commit -m "🤖 Auto: Desativando keys expiradas"
          git push
