name: Verificar e Desativar Keys Expiradas

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-expired:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
      
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Desativar keys expiradas
        run: |
          python3 check_expired.py
          echo "Status do script: $?"
        
      - name: Verificar mudanças
        id: verificar
        run: |
          if git diff --staged --quiet && git diff --quiet; then
            echo "sem_mudancas=true" >> $GITHUB_OUTPUT
          else
            echo "sem_mudancas=false" >> $GITHUB_OUTPUT
          fi
        
      - name: Commit e Push
        if: steps.verificar.outputs.sem_mudancas == 'false'
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git pull origin main --rebase
          git add keys.json
          git commit -m "🤖 Auto: Desativando keys expiradas"
          git push
